{% extends "base.html" %}

{% block contenido %}

<div style="max-width:400px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);">

<h2>🔐 Cambiar contraseña</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<p style="font-size:0.9rem;color:#555;">
La contraseña debe tener al menos:
<br>• 8 caracteres
<br>• 1 letra mayúscula
<br>• 1 carácter especial
</p>

<form method="POST">

<label>Nueva contraseña</label>
<input 
    type="password" 
    name="password" 
    required 
    autocomplete="new-password"
    style="width:100%;padding:10px;margin-top:10px;"
>

<label>Confirmar contraseña</label>
<input 
    type="password" 
    name="confirmar_password" 
    required 
    autocomplete="new-password"
    style="width:100%;padding:10px;margin-top:10px;"
>

<div style="margin-top:10px;">
    <input type="checkbox" onclick="togglePass()"> Mostrar contraseña
</div>

<button style="margin-top:15px;width:100%;">Guardar</button>

</form>

</div>

<script>
function togglePass(){
    const inputs = document.querySelectorAll('input[type="password"], input[type="text"]');
    inputs.forEach(input => {
        if(input.name === "password" || input.name === "confirmar_password"){
            input.type = input.type === "password" ? "text" : "password";
        }
    });
}
</script>

{% endblock %}
