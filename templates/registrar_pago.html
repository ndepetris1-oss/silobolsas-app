{% extends "base.html" %}
{% block contenido %}

<style>
body{
    background:#f4f6f9;
}

.contenedor{
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.card-form{
    background:white;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.titulo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
    text-align:center;
}

.subtitulo{
    text-align:center;
    font-size:14px;
    color:#555;
    margin-bottom:20px;
}

label{
    font-weight:600;
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.2s;
}

input:focus{
    border-color:#1976d2;
    outline:none;
    box-shadow:0 0 0 2px rgba(25,118,210,0.15);
}

.botones{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.btn-guardar{
    flex:1;
    background:#2e7d32;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.btn-guardar:hover{
    background:#1b5e20;
}

.btn-volver{
    flex:1;
    background:#757575;
    color:white;
    text-align:center;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.2s;
}

.btn-volver:hover{
    background:#424242;
}
</style>

<div class="contenedor">

<div class="card-form">

<div class="titulo">💵 Registrar Pago</div>
<div class="subtitulo">
    Empresa: <b>{{ empresa_nombre }}</b>
</div>

<form method="POST">

    <label>Fecha de pago</label>
    <input type="date" name="fecha_pago" value="{{ fecha_hoy }}" required>

    <label>Monto ($)</label>
    <input type="number" step="0.01" name="monto" required>

    <label>Silos cobrados (si aplica)</label>
    <input type="number" name="silos_cobrados">

    <label>Observación</label>
    <input type="text" name="observacion">

    <div class="botones">
        <button type="submit" class="btn-guardar">
            Guardar Pago
        </button>

        <a href="{{ url_for('admin.admin_finanzas') }}" class="btn-volver">
            Volver
        </a>
    </div>

</form>

</div>
</div>

{% endblock %}
