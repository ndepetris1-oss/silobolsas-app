{% extends "base.html" %}
{% block contenido %}

<style>
body { background:#f4f6f9; font-family:Arial,sans-serif; }
.card {
    max-width:600px; margin:30px auto;
    background:white; border-radius:14px;
    padding:30px; box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
h2 { color:#1b5e20; margin-bottom:6px; }
.subtitulo { color:#666; margin-bottom:24px; font-size:.95rem; }
label { display:block; margin-top:16px; font-weight:bold; color:#333; font-size:.9rem; }
input, select, textarea {
    width:100%; padding:10px 12px; margin-top:6px;
    border:1px solid #ccc; border-radius:8px;
    font-size:15px; box-sizing:border-box;
}
textarea { height:80px; resize:vertical; }
.fila { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.btn-guardar {
    width:100%; margin-top:24px; padding:13px;
    background:#2e7d32; color:white; border:none;
    border-radius:10px; font-size:16px; font-weight:bold;
    cursor:pointer;
}
.btn-guardar:hover { background:#1b5e20; }
.seccion { margin-top:20px; padding-top:16px; border-top:1px solid #eee; }
.badge-empresa {
    background:#e8f5e9; color:#1b5e20;
    padding:8px 14px; border-radius:8px;
    font-weight:bold; display:inline-block;
    margin-bottom:20px;
}
#bloqueTransferencia, #bloqueBilletera { display:none; margin-top:10px; }
</style>

<div class="card">
    <h2>💵 Registrar Pago</h2>
    <div class="subtitulo">Complete los datos del pago para generar el recibo</div>

    <div class="badge-empresa">🏢 {{ empresa_nombre }}</div>

    <form method="POST">

        <!-- FECHA Y MONTO -->
        <div class="fila">
            <div>
                <label>Fecha de pago *</label>
                <input type="date" name="fecha_pago" value="{{ fecha_hoy }}" required>
            </div>
            <div>
                <label>Monto ($) *</label>
                <input type="number" name="monto" step="0.01" placeholder="0.00" required>
            </div>
        </div>

        <!-- METODO DE PAGO -->
        <div class="seccion">
            <label>Método de pago *</label>
            <select name="metodo_pago" id="metodoPago" onchange="toggleMetodo()" required>
                <option value="">Seleccione...</option>
                <option value="Transferencia">🏦 Transferencia bancaria</option>
                <option value="Efectivo">💵 Efectivo</option>
                <option value="Mercado Pago">📱 Mercado Pago</option>
                <option value="Uala">📱 Ualá</option>
                <option value="Naranja X">📱 Naranja X</option>
                <option value="Brubank">📱 Brubank</option>
                <option value="Otro">Otro</option>
            </select>

            <div id="bloqueTransferencia">
                <label>Número de comprobante</label>
                <input type="text" name="comprobante" placeholder="Ej: 0012345678">
            </div>

            <div id="bloqueBilletera">
                <label>Alias / CVU</label>
                <input type="text" name="alias_cvu" placeholder="Ej: nombre.apellido.mp">
            </div>
        </div>

        <!-- TIPO DE COBRO -->
        <div class="seccion">
            <label>Tipo de cobro *</label>
            <select name="tipo_periodo" required>
                <option value="">Seleccione...</option>
                <option value="Por silo bolsa">🌾 Por silo bolsa</option>
                <option value="Mensual">📅 Mensual</option>
                <option value="Por campaña">🌱 Por campaña</option>
                <option value="Anual">📆 Anual</option>
            </select>

            <div class="fila" style="margin-top:10px;">
                <div>
                    <label>Silos cobrados</label>
                    <input type="number" name="silos_cobrados" placeholder="0" value="0">
                </div>
                <div>
                    <label>Periodo (ej: Marzo 2026)</label>
                    <input type="text" name="periodo" placeholder="Ej: Campaña 2025/26">
                </div>
            </div>
        </div>

        <!-- OBSERVACION -->
        <div class="seccion">
            <label>Observación</label>
            <textarea name="observacion" placeholder="Notas adicionales..."></textarea>
        </div>

        <button type="submit" class="btn-guardar">
            💾 Registrar y generar recibo PDF
        </button>

    </form>
</div>

<script>
function toggleMetodo(){
    const v = document.getElementById("metodoPago").value;
    document.getElementById("bloqueTransferencia").style.display =
        v === "Transferencia" ? "block" : "none";
    document.getElementById("bloqueBilletera").style.display =
        ["Mercado Pago","Uala","Naranja X","Brubank"].includes(v) ? "block" : "none";
}
</script>

{% endblock %}
